<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="50" />
    </clipPath>
  </defs>
  <rect width="100" height="100" fill="#ffffff" />
  <!-- Use the existing logo (logo.jpg) and mask it to a circle -->
  <image href="/logo.jpg" width="100" height="100" clip-path="url(#circle-clip)" preserveAspectRatio="xMidYMid slice" />
</svg>
